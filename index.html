<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Gasoek+One&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&family=Xanh+Mono:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/styles.css">
    <title>TravelBlog</title>
</head>
<body>
    
    <aside class="sidebar">
        <div class="sidebar-header">
            <nav class="nav">
                <a class="nav-link" href="#">Home</a>
                <a class="nav-link" href="#">Articles</a>
                <a class="nav-link" href="#">About</a>
            </nav>
        </div>
        <div class="sidebar-hero">
            <h1>The Roam <br>Report</h1>
            <img src="img/Train illustration.svg" alt="">
            <p>Stories and photos of long walks, <br> wrong turns, and everyday discoveries</p>
        </div>
        <div class="ticker">
            <div class="ticker-track">
                <div class="ticker-content">
                    <span>Currently in</span>
                    <img class="ticker-icon" src="img/Globe icon.svg" alt="">
                    <span>Dallol, Ethiopia</span>
                    <img class="ticker-icon" src="img/Globe icon.svg" alt="">
                    <span>14.2417° N</span>
                    <img class="ticker-icon" src="img/Globe icon.svg" alt="">
                    <span>40.3000° E</span>
                    <img class="ticker-icon" src="img/Globe icon.svg" alt="">
                </div>
                <div class="ticker-content">
                    <span>Currently in</span>
                    <img class="ticker-icon" src="img/Globe icon.svg" alt="">
                    <span>Dallol, Ethiopia</span>
                    <img class="ticker-icon" src="img/Globe icon.svg" alt="">
                    <span>14.2417° N</span>
                    <img class="ticker-icon" src="img/Globe icon.svg" alt="">
                    <span>40.3000° E</span>
                    <img class="ticker-icon" src="img/Globe icon.svg" alt="">
                </div>
            </div>
        </div>
    </aside>

    <main class="main-content">
        <section class="hero">
            <div class="hero-banner">
                <img src="img/vanphoto.jpg" alt="">
                <p class="hero-eyebrow">Featured article</p>
                <h2 class="hero-title">Wild Camping Along <br> Tasmania’s East Coast</h2>
            </div>
            <div class="scroll-text">
                <p>Scroll for more</p>
                <img src="img/Arrow.svg" alt="">   
            </div>
            
        </section>
    </main>

</body>
</html>
